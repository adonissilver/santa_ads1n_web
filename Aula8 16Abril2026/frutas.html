<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cards de Frutas</title>
    <link rel="stylesheet" href="adonis.css">
</head>
<body>

<h1 class="titulo">🍎 Alimentação Saudável</h1>

<div class="container">

    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTe2UN-oRgoEUTYQnnschvDfBNZ9q-WgbXcKw&s" alt="Maçã">
        <h2>Maçã</h2>
        <p>52 kcal</p>
    </div>

    <div class="card">
        <img src="https://www.shutterstock.com/image-vector/cute-smiling-banana-mascot-waving-600nw-2638765579.jpg" alt="Banana">
        <h2>Banana</h2>
        <p>89 kcal</p>
    </div>

    <div class="card">
        <img src="https://previews.123rf.com/images/djvstock/djvstock1703/djvstock170301226/73620844-kawaii-orange-fruit-icon-vector-illustration-eps-10.jpg" alt="Laranja">
        <h2>Laranja</h2>
        <p>47 kcal</p>
    </div>

    <div class="card">
        <img src="https://i.pinimg.com/736x/7f/19/f2/7f19f234970911bb72b23f5a2601e92e.jpg" alt="Morango">
        <h2>Morango</h2>
        <p>32 kcal</p>
    </div>

    <div class="card">
        <img src="https://i.etsystatic.com/11529775/r/il/5804d9/2442285401/il_570xN.2442285401_hct8.jpg" alt="Abacaxi">
        <h2>Abacaxi</h2>
        <p>50 kcal</p>
    </div>

    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4Tq-gJChASTbykxKYi__Ne19FxAcBB9K33w&s" alt="Melancia">
        <h2>Melancia</h2>
        <p>30 kcal</p>
    </div>

    <div class="card">
        <img src="https://www.shutterstock.com/image-vector/grape-vine-vector-icon-elegant-260nw-1859400280.jpg" alt="Uva">
        <h2>Uva</h2>
        <p>69 kcal</p>
    </div>

    <div class="card">
        <img src="https://static.vecteezy.com/system/resources/previews/027/876/020/non_2x/illustration-of-cute-kawaii-fruit-icon-cartoon-character-mango-isolated-on-white-background-vector.jpg" alt="Manga">
        <h2>Manga</h2>
        <p>60 kcal</p>
    </div>

    <!-- Card motivacional -->
    <div class="card destaque">
        <h2>💪 Cuide do seu corpo</h2>
        <p>Uma alimentação saudável é o primeiro passo para uma vida melhor!</p>
    </div>

</div>

</body>
</html>
